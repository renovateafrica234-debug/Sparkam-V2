<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Path - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f051a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spark-gradient { background: linear-gradient(90deg, #ff00cc, #3333ff); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <h2 class="text-3xl font-black mb-12">Choose Your Campaign Tier</h2>
    <div class="grid md:grid-cols-3 gap-6 max-w-5xl w-full">
        <div class="glass p-8 rounded-[2rem] border-pink-500/50 border flex flex-col justify-between">
            <div>
                <h4 class="text-xs font-bold text-pink-500 uppercase tracking-widest mb-4">Beta Access</h4>
                <div class="text-4xl font-black mb-4">Free</div>
                <p class="text-gray-400 text-xs mb-6">Test the AI Brain with full analysis and content creation tools.</p>
            </div>
            <a href="/dashboard.html" class="spark-gradient text-center py-4 rounded-xl font-black uppercase text-xs tracking-widest">Select Free</a>
        </div>

        <div class="glass p-8 rounded-[2rem] opacity-50 relative overflow-hidden">
            <div class="absolute top-4 right-4"><i class="fa-solid fa-lock"></i></div>
            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Regular</h4>
            <div class="text-4xl font-black mb-4">₦14,000</div>
            <p class="text-gray-400 text-xs">Full 360° Managed Campaign execution.</p>
        </div>

        <div class="glass p-8 rounded-[2rem] opacity-50 relative overflow-hidden">
             <div class="absolute top-4 right-4"><i class="fa-solid fa-lock"></i></div>
            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Pro</h4>
            <div class="text-4xl font-black mb-4">₦60,000</div>
            <p class="text-gray-400 text-xs">Unlimited artists and label-tier distribution.</p>
        </div>
    </div>
</body>
</html>
