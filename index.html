<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkam — Your AI Music Marketing Manager</title>
  <meta name="description" content="Sparkam's AI brain generates professional 30-day music marketing campaigns in 2 minutes. Built for independent Nigerian artists." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06040e;
      --bg2:       #0d0a1f;
      --bg3:       #110e27;
      --pink:      #ff1f7a;
      --pink-glow: rgba(255,31,122,0.18);
      --purple:    #8b3dff;
      --purple-glow: rgba(139,61,255,0.15);
      --violet:    #c23dff;
      --text:      #ede8f8;
      --muted:     #8a82a8;
      --border:    rgba(139,61,255,0.18);
      --card:      rgba(255,255,255,0.035);
      --radius:    16px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Canvas starfield ── */
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none; opacity: 0.4;
    }

    /* ── Gradient orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
      animation: orb-drift 20s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--pink-glow); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--purple-glow); top: 30%; right: -120px; animation-delay: -8s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(194,61,255,0.1); bottom: 10%; left: 20%; animation-delay: -14s; }
    @keyframes orb-drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(40px, 30px) scale(1.1); }
      100% { transform: translate(-20px, 50px) scale(0.95); }
    }

    /* ── Layout utility ── */
    .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 2; }
    section { position: relative; z-index: 2; }

    /* ════════════════════════════════
       NAV
    ════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 18px 0;
      transition: background 0.3s, backdrop-filter 0.3s, border-color 0.3s;
    }
    nav.scrolled {
      background: rgba(6,4,14,0.82);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo {
      font-family: var(--font-head); font-weight: 800; font-size: 1.5rem; letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .btn-nav {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-family: var(--font-body); font-weight: 600;
      font-size: 0.875rem; padding: 10px 22px; border-radius: 100px;
      text-decoration: none; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 0 20px rgba(255,31,122,0.3);
    }
    .btn-nav:hover { opacity: 0.88; transform: translateY(-1px); }
    .nav-mobile-btn { display: none; }

    /* ════════════════════════════════
       HERO
    ════════════════════════════════ */
    .hero {
      min-height: 100svh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 120px 24px 80px;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,31,122,0.1); border: 1px solid rgba(255,31,122,0.25);
      color: var(--pink); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em;
      padding: 6px 16px; border-radius: 100px; margin-bottom: 28px;
      animation: fade-up 0.6s ease both;
      text-transform: uppercase;
    }
    .hero-badge .dot {
      width: 6px; height: 6px; background: var(--pink); border-radius: 50%;
      animation: pulse-dot 2s ease infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .hero h1 {
      font-family: var(--font-head); font-size: clamp(2.6rem, 7vw, 5.2rem);
      font-weight: 800; line-height: 1.08; letter-spacing: -0.03em;
      max-width: 820px;
      animation: fade-up 0.7s 0.1s ease both;
    }
    .hero h1 .line-grad {
      background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 60%, var(--purple) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero-sub {
      color: var(--muted); font-size: clamp(1rem, 2vw, 1.15rem);
      max-width: 580px; margin: 20px auto 0; line-height: 1.7;
      animation: fade-up 0.7s 0.2s ease both;
    }
    .hero-ctas {
      display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
      margin-top: 36px;
      animation: fade-up 0.7s 0.35s ease both;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-family: var(--font-body); font-weight: 600;
      font-size: 1rem; padding: 14px 30px; border-radius: 100px;
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 0 40px rgba(255,31,122,0.35), 0 4px 24px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(255,31,122,0.5), 0 8px 32px rgba(0,0,0,0.5); }
    .btn-secondary {
      color: var(--text); font-family: var(--font-body); font-weight: 500;
      font-size: 1rem; padding: 14px 30px; border-radius: 100px;
      text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border); background: var(--card);
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: rgba(139,61,255,0.5); background: rgba(139,61,255,0.08); }

    /* stats strip */
    .stats-strip {
      display: flex; gap: 0; margin-top: 60px; flex-wrap: wrap; justify-content: center;
      animation: fade-up 0.7s 0.5s ease both;
    }
    .stat-item {
      padding: 18px 36px; text-align: center;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }
    .stat-num {
      font-family: var(--font-head); font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--pink), var(--violet));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }
    .stat-label { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.04em; margin-top: 3px; text-transform: uppercase; }

    /* scroll hint */
    .scroll-hint {
      margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--muted); font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
      animation: fade-up 0.7s 0.7s ease both;
    }
    .scroll-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--pink), transparent);
      animation: scroll-pulse 2s ease infinite;
    }
    @keyframes scroll-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    /* ════════════════════════════════
       SECTION SHARED
    ════════════════════════════════ */
    .section-label {
      display: inline-block; font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--pink);
      margin-bottom: 12px;
    }
    .section-title {
      font-family: var(--font-head); font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800; letter-spacing: -0.025em; line-height: 1.15;
    }
    .section-sub { color: var(--muted); max-width: 540px; margin: 12px auto 0; font-size: 1.05rem; }

    /* ════════════════════════════════
       HOW IT WORKS
    ════════════════════════════════ */
    .how { padding: 100px 0; }
    .how-header { text-align: center; margin-bottom: 60px; }
    .steps {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .step {
      background: var(--bg);
      padding: 40px 32px;
      position: relative; overflow: hidden;
      transition: background 0.3s;
    }
    .step:hover { background: var(--bg2); }
    .step::before {
      content: attr(data-num);
      position: absolute; right: 20px; top: 20px;
      font-family: var(--font-head); font-size: 5rem; font-weight: 800;
      color: rgba(255,255,255,0.03); line-height: 1; pointer-events: none;
      user-select: none;
    }
    .step-num {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-weight: 700; font-size: 1rem;
      color: #fff; margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(255,31,122,0.35);
    }
    .step h3 {
      font-family: var(--font-head); font-weight: 700; font-size: 1.15rem; margin-bottom: 10px;
    }
    .step p { color: var(--muted); font-size: 0.92rem; line-height: 1.65; }
    .step-tag {
      display: inline-block; margin-top: 16px; padding: 4px 12px;
      background: rgba(255,31,122,0.1); border: 1px solid rgba(255,31,122,0.2);
      color: var(--pink); font-size: 0.75rem; border-radius: 100px; font-weight: 600;
    }

    /* ════════════════════════════════
       PRICING
    ════════════════════════════════ */
    .pricing { padding: 100px 0; }
    .pricing-header { text-align: center; margin-bottom: 56px; }
    .pricing-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px; align-items: stretch;
    }
    .plan {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px 28px;
      display: flex; flex-direction: column; position: relative;
      transition: border-color 0.3s, transform 0.3s;
    }
    .plan:hover { border-color: rgba(139,61,255,0.4); transform: translateY(-4px); }
    .plan.featured {
      background: linear-gradient(145deg, rgba(139,61,255,0.12), rgba(255,31,122,0.08));
      border-color: rgba(139,61,255,0.4);
      box-shadow: 0 0 40px rgba(139,61,255,0.15);
    }
    .plan-badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      padding: 4px 14px; border-radius: 100px; white-space: nowrap;
      text-transform: uppercase;
    }
    .plan-name {
      font-family: var(--font-head); font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
    }
    .plan-price {
      font-family: var(--font-head); font-size: 2.4rem; font-weight: 800;
      letter-spacing: -0.03em; line-height: 1;
    }
    .plan-price span { font-size: 0.9rem; font-weight: 400; color: var(--muted); margin-left: 4px; }
    .plan-usd { color: var(--muted); font-size: 0.85rem; margin-top: 4px; margin-bottom: 22px; }
    .plan-divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    .plan-features { list-style: none; flex: 1; display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }
    .plan-features li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.9rem; color: var(--muted);
    }
    .plan-features li::before {
      content: '✓'; color: var(--pink); font-weight: 700; flex-shrink: 0; margin-top: 1px;
    }
    .btn-plan {
      display: block; text-align: center; text-decoration: none;
      padding: 13px; border-radius: 100px; font-weight: 600; font-size: 0.95rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-plan:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-plan-fill {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; box-shadow: 0 0 30px rgba(255,31,122,0.3);
    }
    .btn-plan-outline { border: 1px solid var(--border); color: var(--text); }
    .btn-plan-outline:hover { border-color: rgba(139,61,255,0.5); }

    /* ════════════════════════════════
       FEATURES
    ════════════════════════════════ */
    .features { padding: 80px 0 100px; }
    .features-header { text-align: center; margin-bottom: 56px; }
    .features-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .feat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px;
      transition: border-color 0.3s, transform 0.3s;
      position: relative; overflow: hidden;
    }
    .feat-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      transform: scaleX(0); transform-origin: left; transition: transform 0.3s;
    }
    .feat-card:hover { border-color: rgba(139,61,255,0.35); transform: translateY(-3px); }
    .feat-card:hover::after { transform: scaleX(1); }
    .feat-icon {
      font-size: 1.8rem; margin-bottom: 16px; display: block;
      filter: drop-shadow(0 0 8px rgba(255,31,122,0.4));
    }
    .feat-card h3 {
      font-family: var(--font-head); font-weight: 700; font-size: 1.05rem; margin-bottom: 8px;
    }
    .feat-card p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }

    /* ════════════════════════════════
       SOCIAL PROOF / TRUST STRIP
    ════════════════════════════════ */
    .trust { padding: 60px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .trust-inner { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 40px; }
    .trust-item { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.88rem; }
    .trust-item .ti-icon { font-size: 1.2rem; filter: drop-shadow(0 0 6px rgba(255,31,122,0.4)); }
    .trust-item strong { color: var(--text); }

    /* ════════════════════════════════
       CTA BAND
    ════════════════════════════════ */
    .cta-band {
      padding: 100px 0; text-align: center;
    }
    .cta-card {
      background: linear-gradient(145deg, rgba(139,61,255,0.12), rgba(255,31,122,0.08));
      border: 1px solid rgba(139,61,255,0.3);
      border-radius: 24px; padding: 72px 40px;
      position: relative; overflow: hidden;
    }
    .cta-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 24px;
      background: radial-gradient(circle at 50% 0%, rgba(255,31,122,0.12), transparent 70%);
      pointer-events: none;
    }
    .cta-card h2 {
      font-family: var(--font-head); font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 800; letter-spacing: -0.025em; margin-bottom: 14px;
    }
    .cta-card p { color: var(--muted); font-size: 1.05rem; max-width: 500px; margin: 0 auto 32px; }

    /* ════════════════════════════════
       FOOTER
    ════════════════════════════════ */
    footer {
      padding: 56px 0 36px;
      border-top: 1px solid var(--border);
    }
    .footer-inner {
      display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr;
      gap: 48px; margin-bottom: 48px;
    }
    .footer-brand p { color: var(--muted); font-size: 0.88rem; margin-top: 12px; line-height: 1.6; max-width: 220px; }
    .footer-col h4 {
      font-family: var(--font-head); font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); margin-bottom: 16px;
    }
    .footer-col a {
      display: block; color: var(--muted); text-decoration: none; font-size: 0.88rem;
      margin-bottom: 9px; transition: color 0.2s;
    }
    .footer-col a:hover { color: var(--text); }
    .waitlist-form { display: flex; flex-direction: column; gap: 8px; }
    .waitlist-input {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 10px;
      font-family: var(--font-body); font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .waitlist-input:focus { border-color: rgba(255,31,122,0.5); }
    .waitlist-input::placeholder { color: var(--muted); }
    .btn-waitlist {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff; font-family: var(--font-body); font-weight: 600; font-size: 0.88rem;
      padding: 10px; border-radius: 10px; border: none; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-waitlist:hover { opacity: 0.85; }
    .footer-bottom {
      border-top: 1px solid var(--border); padding-top: 28px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .footer-bottom p { color: var(--muted); font-size: 0.82rem; }
    .footer-bottom a { color: var(--muted); text-decoration: none; }
    .footer-bottom a:hover { color: var(--text); }
    .footer-links { display: flex; gap: 20px; }

    /* ════════════════════════════════
       ANIMATIONS
    ════════════════════════════════ */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ════════════════════════════════
       RESPONSIVE
    ════════════════════════════════ */
    @media (max-width: 900px) {
      .footer-inner { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-mobile-btn { display: flex; }
      .stat-item { padding: 14px 20px; }
      .stat-num { font-size: 1.6rem; }
      .footer-inner { grid-template-columns: 1fr; gap: 28px; }
      .footer-bottom { flex-direction: column; align-items: flex-start; }
      .cta-card { padding: 48px 24px; }
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
