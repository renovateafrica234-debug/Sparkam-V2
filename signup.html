<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Sparkam Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f051a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spark-gradient { background: linear-gradient(90deg, #ff00cc, #3333ff); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center border-white/10">
        <h2 class="text-3xl font-black mb-2 uppercase tracking-tight">Beta Access</h2>
        <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-[0.3em]">Join the Sparkam Leads Pool</p>
        
        <form id="signupForm" class="space-y-4 text-left">
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-2 tracking-widest">Full Name</label>
                <input type="text" id="fullName" required placeholder="John Doe" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-pink-500 transition mt-1 text-sm">
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-2 tracking-widest">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-pink-500 transition mt-1 text-sm">
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-500 ml-2 tracking-widest">Artist Name</label>
                <input type="text" id="artistName" required placeholder="Artist Stage Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-pink-500 transition mt-1 text-sm">
            </div>
            
            <button type="submit" id="submitBtn" class="spark-gradient w-full py-4 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg shadow-pink-500/20 mt-4 hover:scale-[1.02] transition">
                Create Account
            </button>
        </form>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            const name = document.getElementById('fullName').value;
            const artist = document.getElementById('artistName').value;

            btn.innerText = "CONNECTING BRAIN...";
            btn.disabled = true;

            // Save for Dashboard Use
            localStorage.setItem('sparkam_email', email);
            localStorage.setItem('sparkam_name', name);
            localStorage.setItem('sparkam_artist', artist);

            const leadData = { name, email, artist, timestamp: new Date().toISOString() };

            try {
                // IMPORTANT: Removed 'no-cors' to ensure data actually sends. 
                // Replace with your URL from
                await fetch('https://hooks.zapier.com/hooks/catch/21578502/27vsqx1/', {
                    method: 'POST',
                    body: JSON.stringify(leadData)
                });
            } catch (error) {
                console.warn("External Brain link slow, proceeding with local cache.");
            } finally {
                window.location.href = 'plan-selection.html';
            }
        });
    </script>
</body>
</html>
