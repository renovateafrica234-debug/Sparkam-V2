<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Sparkam Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f051a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spark-gradient { background: linear-gradient(90deg, #ff00cc, #3333ff); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center">
        <h2 class="text-3xl font-black mb-2">Beta Access</h2>
        <p class="text-gray-500 text-[10px] mb-8 uppercase tracking-widest">Connect with the AI Brain [cite: 2026-02-06]</p>
        
        <form onsubmit="event.preventDefault(); window.location.href='/dashboard.html';" class="space-y-4">
            <input type="text" placeholder="Full Name" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-pink-500 transition">
            <input type="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-pink-500 transition">
            <input type="text" placeholder="Artist Name" required class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-pink-500 transition">
            <button type="submit" class="spark-gradient w-full py-4 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg shadow-pink-500/20">Enter Dashboard</button>
        </form>
    </div>
</body>
</html>
