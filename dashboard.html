<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam (DEBUG)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spark-btn {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
        }
        .section-card {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #ff00cc;
        }
        #debug-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #ff00cc;
            padding: 10px;
            font-size: 11px;
            font-family: monospace;
            z-index: 9999;
        }
        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .log-success { color: #00ff00; }
        .log-error { color: #ff0000; }
        .log-info { color: #00ccff; }
        .log-warn { color: #ffaa00; }
    </style>
</head>
<body class="min-h-screen pb-52">

    <!-- Navigation -->
    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black gradient-text">SPARKAM</div>
            <div class="flex items-center gap-6">
                <span id="user-name" class="text-sm text-gray-400">Loading...</span>
                <span id="user-tier" class="px-3 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400">ESSENTIAL (FREE)</span>
                <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="mb-8">
            <h1 class="text-4xl font-black mb-2">
                Welcome back, <span id="welcome-name" class="gradient-text">Artist</span>!
            </h1>
            <p class="text-gray-400">Generate AI-powered campaigns instantly</p>
            <p class="text-xs text-yellow-400 mt-2">🐛 DEBUG MODE - Errors shown at bottom</p>
        </div>

        <!-- Campaign Form -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-bolt text-pink-500 mr-2"></i>
                Generate Campaign
            </h2>

            <form id="campaign-form" class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Track Title</label>
                    <input type="text" id="trackTitle" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" placeholder="Track name" required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Genre</label>
                    <select id="genre" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" required>
                        <option value="">Select genre</option>
                        <option value="Afropop">Afropop</option>
                        <option value="Afrobeats">Afrobeats</option>
                        <option value="Alté">Alté</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="R&B">R&B</option>
                        <option value="Pop">Pop</option>
                        <option value="Indie">Indie</option>
                        <option value="Electronic">Electronic</option>
                        <option value="Rock">Rock</option>
                        <option value="Gospel">Gospel</option>
                        <option value="Amapiano">Amapiano</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Budget (₦ or $)</label>
                    <input type="number" id="budget" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" value="150000" min="10000" required>
                </div>

                <div class="flex items-end">
                    <button type="submit" id="spark-btn" class="w-full spark-btn py-4 rounded-xl font-bold text-lg uppercase">
                        <i class="fa-solid fa-bolt mr-2"></i>SPARK IT
                    </button>
                </div>
            </form>
        </div>

        <!-- Results -->
        <div id="results-section" class="glass rounded-3xl p-8" style="display: none;">
            <div class="bg-gradient-to-r from-green-500/20 to-cyan-500/20 rounded-2xl p-6 mb-6 border-2 border-green-500/50">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-black mb-2">
                            <i class="fa-solid fa-check-circle text-green-400 mr-2"></i>
                            Campaign Ready!
                        </h2>
                        <p class="text-gray-300 text-sm">Your campaign has been saved to your account</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="executeWorkflow()" id="workflow-btn" 
                                class="px-8 py-4 bg-gradient-to-r from-green-500 to-cyan-500 rounded-xl font-black text-lg hover:opacity-90 transition shadow-lg">
                            <i class="fa-solid fa-rocket mr-2"></i>Execute Workflow
                        </button>
                        <button onclick="downloadPDF()" 
                                class="px-6 py-4 spark-btn rounded-xl font-bold shadow-lg">
                            <i class="fa-solid fa-download mr-2"></i>PDF
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="campaign-results"></div>
        </div>
    </div>

    <!-- DEBUG LOG -->
    <div id="debug-log">
        <div style="color: #ff00cc; font-weight: bold; margin-bottom: 5px;">🐛 DEBUG LOG:</div>
    </div>

    <script type="module">
        // DEBUG LOGGER
        const debugLog = document.getElementById('debug-log');
        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry log-' + type;
            entry.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            debugLog.appendChild(entry);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(msg);
        }

        // Catch all errors
        window.onerror = function(msg, url, line, col, error) {
            log('ERROR: ' + msg + ' (line ' + line + ')', 'error');
            return false;
        };

        log('Page loaded', 'success');

        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
        log('Supabase imported', 'success');

        const SUPABASE_URL = 'https://avlbrhnsjylaaokjofoo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2bGJyaG5zanlsYWFva2pvZm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDIwODYsImV4cCI6MjA4ODg3ODA4Nn0.veYbgIVokeEVx_2M0AXAYF50g5IWVdymVFjtLKz5_d8';
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log('Supabase client created', 'success');

        let currentUser = null;
        let currentCampaign = null;
        let userProfile = null;

        async function init() {
            log('Checking authentication...', 'info');
            
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                log('Not logged in, redirecting...', 'warn');
                window.location.href = 'login.html';
                return;
            }

            log('User authenticated: ' + user.id, 'success');
            currentUser = user;
            await loadUserProfile();
        }

        async function loadUserProfile() {
            log('Loading user profile...', 'info');
            
            const { data, error } = await supabase
                .from('users')
                .select('*')
                .eq('id', currentUser.id)
                .single();

            if (error) {
                log('Profile error: ' + error.message, 'error');
                return;
            }

            if (data) {
                userProfile = data;
                log('Profile loaded: ' + data.artist_name, 'success');
                
                document.getElementById('user-name').textContent = data.artist_name;
                document.getElementById('welcome-name').textContent = data.artist_name;
                document.getElementById('user-tier').textContent = data.tier.toUpperCase() + (data.is_beta_tester ? ' (FREE BETA)' : '');
            }
        }

        document.getElementById('campaign-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            log('Form submitted', 'info');
            
            if (!userProfile) {
                log('Profile not loaded yet', 'warn');
                alert('Profile not loaded yet, please wait...');
                return;
            }
            
            const formData = {
                trackTitle: document.getElementById('trackTitle').value.trim(),
                genre: document.getElementById('genre').value,
                budget: parseInt(document.getElementById('budget').value)
            };
            
            log('Form data: ' + JSON.stringify(formData), 'info');
            
            const btn = document.getElementById('spark-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>GENERATING...';
            
            try {
                log('Calling /api/generate-campaign...', 'info');
                
                const response = await fetch('/api/generate-campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        artistName: userProfile.artist_name,
                        ...formData
                    })
                });
                
                log('API Response status: ' + response.status, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    const text = await response.text();
                    log('API Error response: ' + text.substring(0, 200), 'error');
                    throw new Error('API returned ' + response.status);
                }
                
                const data = await response.json();
                log('API returned data: ' + (data.success ? 'SUCCESS' : 'FAILED'), data.success ? 'success' : 'error');
                
                if (data.success) {
                    log('Saving to database...', 'info');
                    
                    const { data: savedCampaign, error } = await supabase
                        .from('campaigns')
                        .insert([{
                            user_id: currentUser.id,
                            artist_name: userProfile.artist_name,
                            track_title: formData.trackTitle,
                            genre: formData.genre,
                            budget: formData.budget,
                            currency: data.campaign.currency,
                            strategy: data.campaign.strategy
                        }])
                        .select()
                        .single();

                    if (error) {
                        log('Database error: ' + error.message, 'error');
                        throw error;
                    }

                    log('Saved to database!', 'success');
                    currentCampaign = savedCampaign;
                    displayCampaign(savedCampaign);
                } else {
                    throw new Error(data.error || 'Failed');
                }
                
            } catch (error) {
                log('FATAL ERROR: ' + error.message, 'error');
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i>SPARK IT';
            }
        });

        function displayCampaign(campaign) {
            log('Displaying campaign...', 'info');
            const section = document.getElementById('results-section');
            const resultsDiv = document.getElementById('campaign-results');
            const strategy = campaign.strategy;
            const currency = campaign.currency || '₦';
            
            let html = `
                <div class="bg-gradient-to-r from-pink-500/10 to-purple-500/10 rounded-xl p-6 mb-6 border border-pink-500/20">
                    <h3 class="text-2xl font-bold mb-3">"${campaign.track_title}"</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <div class="text-gray-400 text-xs">Genre</div>
                            <div class="font-bold">${campaign.genre}</div>
                        </div>
                        <div>
                            <div class="text-gray-400 text-xs">Total Budget</div>
                            <div class="font-bold text-pink-400">${currency}${campaign.budget.toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="text-gray-400 text-xs">Campaign Type</div>
                            <div class="font-bold text-xs">${strategy.campaign_type || 'Indie'}</div>
                        </div>
                    </div>
                </div>
            `;

            if (strategy.realistic_expectations) {
                html += `
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="section-card rounded-xl p-4">
                            <div class="text-gray-400 text-xs mb-1">Streams (30d)</div>
                            <div class="text-2xl font-black text-pink-400">${strategy.realistic_expectations.streams_30_days}</div>
                        </div>
                        <div class="section-card rounded-xl p-4">
                            <div class="text-gray-400 text-xs mb-1">New Followers</div>
                            <div class="text-2xl font-black text-purple-400">${strategy.realistic_expectations.new_followers}</div>
                        </div>
                        <div class="section-card rounded-xl p-4">
                            <div class="text-gray-400 text-xs mb-1">Playlists</div>
                            <div class="text-2xl font-black text-blue-400">${strategy.realistic_expectations.playlist_adds}</div>
                        </div>
                        <div class="section-card rounded-xl p-4">
                            <div class="text-gray-400 text-xs mb-1">ROI</div>
                            <div class="text-2xl font-black text-green-400">${strategy.realistic_expectations.roi_percentage}</div>
                        </div>
                    </div>
                `;
            }

            if (strategy.budget_breakdown) {
                html += `<div class="section-card rounded-xl p-6 mb-6">
                    <h4 class="font-bold text-lg mb-4">💰 Budget Allocation</h4>
                    <div class="grid md:grid-cols-3 gap-4">`;
                
                Object.keys(strategy.budget_breakdown).forEach(key => {
                    if (key !== 'total') {
                        const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        html += `<div class="bg-black/40 rounded-lg p-4">
                            <div class="text-xs text-gray-400">${label}</div>
                            <div class="font-black text-xl text-pink-400">${strategy.budget_breakdown[key]}</div>
                        </div>`;
                    }
                });
                
                html += `</div></div>`;
            }

            const sections = [
                { key: 'market_research', icon: '📊', title: 'Market Research' },
                { key: 'influencer_strategy', icon: '👥', title: 'Influencer Strategy' },
                { key: 'content_strategy', icon: '📱', title: 'Content Strategy' },
                { key: 'playlist_strategy', icon: '🎵', title: 'Playlist Strategy' },
                { key: 'action_plan', icon: '📅', title: 'Action Plan' },
                { key: 'roi_projections', icon: '💰', title: 'ROI Projections' }
            ];

            sections.forEach(sec => {
                if (strategy[sec.key]) {
                    let text = typeof strategy[sec.key] === 'string' 
                        ? strategy[sec.key] 
                        : JSON.stringify(strategy[sec.key], null, 2);
                    
                    html += `<div class="section-card rounded-xl p-6 mb-4">
                        <h4 class="font-bold text-lg mb-3">${sec.icon} ${sec.title}</h4>
                        <div class="text-sm text-gray-300 whitespace-pre-wrap">${text}</div>
                    </div>`;
                }
            });

            resultsDiv.innerHTML = html;
            section.style.display = 'block';
            section.scrollIntoView({ behavior: 'smooth' });
            log('Campaign displayed!', 'success');
        }

        window.logout = async function() {
            log('Logging out...', 'info');
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        window.executeWorkflow = async function() {
            log('Execute workflow clicked', 'info');
            if (!currentCampaign) {
                alert('Please generate a campaign first!');
                return;
            }
            
            const btn = document.getElementById('workflow-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Creating...';
            
            try {
                log('Calling /api/generate-workflow...', 'info');
                const response = await fetch('/api/generate-workflow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campaign: currentCampaign })
                });
                
                const data = await response.json();
                log('Workflow API response: ' + (data.success ? 'SUCCESS' : 'FAILED'), data.success ? 'success' :
