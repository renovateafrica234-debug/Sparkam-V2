<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%); font-family: 'Inter', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #ff00cc, #3333ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .spark-btn { background: linear-gradient(90deg, #ff00cc, #3333ff); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black gradient-text">SPARKAM</div>
            <div class="flex items-center gap-6">
                <span id="tier-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-pink-500/20 text-pink-400">PRO</span>
                <a href="/profile.html" class="text-gray-400 hover:text-white"><i class="fa-solid fa-user"></i></a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-4xl font-black mb-2">Welcome back, <span class="gradient-text" id="artist-name">Artist</span>!</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 mt-8">
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Total Campaigns</div>
                <div class="text-3xl font-black gradient-text">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">This Month</div>
                <div class="text-3xl font-black text-pink-400">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Chat Messages</div>
                <div class="text-3xl font-black text-purple-400">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Status</div>
                <div class="text-lg font-black text-green-400">Active</div>
            </div>
        </div>

        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-black mb-6"><i class="fa-solid fa-bolt text-pink-500 mr-2"></i>Generate New Campaign</h2>
            <form id="campaign-form" class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Artist Name</label>
                    <input type="text" id="artistName" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Track Title</label>
                    <input type="text" id="trackTitle" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3" required>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Genre</label>
                    <select id="genre" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3">
                        <option>Afropop</option>
                        <option>Afrobeats</option>
                        <option>Alté</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">Budget (₦)</label>
                    <input type="number" id="budget" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3" value="50000">
                </div>
                <div class="md:col-span-2">
                    <button type="submit" class="w-full spark-btn py-4 rounded-xl font-bold text-lg">
                        <i class="fa-solid fa-bolt mr-2"></i>SPARK IT
                    </button>
                </div>
            </form>
        </div>

        <div class="glass rounded-3xl p-8">
            <h2 class="text-2xl font-black mb-6">Recent Campaigns</h2>
            <div id="campaigns-list" class="text-center text-gray-400 py-12">
                No campaigns yet. Generate your first one above!
            </div>
        </div>
    </div>
</body>
</html>
