<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spark-btn {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
        }
        .section-card {
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid #ff00cc;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black gradient-text">SPARKAM</div>
            <div class="flex items-center gap-6">
                <span id="user-name" class="text-sm text-gray-400">Loading...</span>
                <span id="user-tier" class="px-3 py-1 rounded-full text-xs font-bold bg-green-500/20 text-green-400">ESSENTIAL (FREE)</span>
                <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="mb-8">
            <h1 class="text-4xl font-black mb-2">
                Welcome back, <span id="welcome-name" class="gradient-text">Artist</span>!
            </h1>
            <p class="text-gray-400">Generate AI-powered campaigns instantly</p>
        </div>

        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-bolt text-pink-500 mr-2"></i>
                Generate Campaign
            </h2>

            <form id="campaign-form" class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Track Title</label>
                    <input type="text" id="trackTitle" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" placeholder="Track name" required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Genre</label>
                    <select id="genre" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" required>
                        <option value="">Select genre</option>
                        <option value="Afropop">Afropop</option>
                        <option value="Afrobeats">Afrobeats</option>
                        <option value="Alté">Alté</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="R&B">R&B</option>
                        <option value="Pop">Pop</option>
                        <option value="Indie">Indie</option>
                        <option value="Electronic">Electronic</option>
                        <option value="Rock">Rock</option>
                        <option value="Gospel">Gospel</option>
                        <option value="Amapiano">Amapiano</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Budget (₦ or $)</label>
                    <input type="number" id="budget" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" value="150000" min="10000" required>
                </div>

                <div class="flex items-end">
                    <button type="submit" id="spark-btn" class="w-full spark-btn py-4 rounded-xl font-bold text-lg uppercase">
                        <i class="fa-solid fa-bolt mr-2"></i>SPARK IT
                    </button>
                </div>
            </form>
            
            <div id="error-display" class="mt-4 p-4 bg-red-500/20 border border-red-500 rounded-xl text-red-300 text-sm" style="display: none;"></div>
        </div>

        <div id="results-section" class="glass rounded-3xl p-8" style="display: none;">
            <div class="bg-gradient-to-r from-green-500/20 to-cyan-500/20 rounded-2xl p-6 mb-6 border-2 border-green-500/50">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-black mb-2">
                            <i class="fa-solid fa-check-circle text-green-400 mr-2"></i>
                            Campaign Ready!
                        </h2>
                        <p class="text-gray-300 text-sm">Your campaign has been saved</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="executeWorkflow()" id="workflow-btn" 
                                class="px-8 py-4 bg-gradient-to-r from-green-500 to-cyan-500 rounded-xl font-black text-lg hover:opacity-90 transition shadow-lg">
                            <i class="fa-solid fa-rocket mr-2"></i>Execute Workflow
                        </button>
                        <button onclick="downloadPDF()" 
                                class="px-6 py-4 spark-btn rounded-xl font-bold shadow-lg">
                            <i class="fa-solid fa-download mr-2"></i>PDF
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="campaign-results"></div>
        </div>
    </div>

    <script>
        console.log('✅ Script loaded!');
        
        const SUPABASE_URL = 'https://avlbrhnsjylaaokjofoo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2bGJyaG5zanlsYWFva2pvZm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDIwODYsImV4cCI6MjA4ODg3ODA4Nn0.veYbgIVokeEVx_2M0AXAYF50g5IWVdymVFjtLKz5_d8';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let currentCampaign = null;
        let userProfile = null;

        console.log('✅ Supabase initialized');

        async function init() {
            console.log('🔐 Checking auth...');
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                console.log('❌ Not logged in');
                window.location.href = 'login.html';
                return;
            }
            console.log('✅ User logged in:', user.id);
            currentUser = user;
            await loadUserProfile();
        }

        async function loadUserProfile() {
            console.log('📊 Loading profile...');
            const { data } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
            if (data) {
                userProfile = data;
                console.log('✅ Profile loaded:', data.artist_name);
                document.getElementById('user-name').textContent = data.artist_name;
                document.getElementById('welcome-name').textContent = data.artist_name;
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-display');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            console.error('ERROR:', message);
        }

        function hideError() {
            document.getElementById('error-display').style.display = 'none';
        }

        document.getElementById('campaign-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('🚀 Form submitted!');
            
            if (!userProfile) {
                alert('Profile not loaded yet');
                return;
            }
            
            hideError();
            
            const formData = {
                trackTitle: document.getElementById('trackTitle').value.trim(),
                genre: document.getElementById('genre').value,
                budget: parseInt(document.getElementById('budget').value)
            };
            
            console.log('📝 Form data:', formData);
            
            const btn = document.getElementById('spark-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>GENERATING...';
            
            try {
                console.log('📡 Calling API...');
                
                const response = await fetch('/api/generate-campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        artistName: userProfile.artist_name,
                        ...formData
                    })
                });
                
                console.log('📡 Response received:', response.status);
                
                if (!response.ok) {
                    const text = await response.text();
                    console.error('❌ Response error:', text);
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ Data received:', data);
                
                if (data.success) {
                    console.log('💾 Saving to database...');
                    
                    const { data: saved, error } = await supabase.from('campaigns').insert([{
                        user_id: currentUser.id,
                        artist_name: userProfile.artist_name,
                        track_title: formData.trackTitle,
                        genre: formData.genre,
                        budget: formData.budget,
                        currency: data.campaign.currency,
                        strategy: data.campaign.strategy
                    }]).select().single();

                    if (error) {
                        console.error('❌ Database error:', error);
                        throw error;
                    }

                    console.log('✅ Saved!');
                    currentCampaign = saved;
                    displayCampaign(saved);
                } else {
                    throw new Error(data.error || 'Failed');
                }
            } catch (error) {
                console.error('💥 ERROR:', error);
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i>SPARK IT';
            }
        });

        function displayCampaign(campaign) {
            console.log('🎨 Displaying campaign...');
            const s = campaign.strategy;
            const c = campaign.currency || '₦';
            
            let html = `
                <div class="bg-gradient-to-r from-pink-500/10 to-purple-500/10 rounded-xl p-6 mb-6 border border-pink-500/20">
                    <h3 class="text-2xl font-bold mb-3">"${campaign.track_title}"</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div><div class="text-gray-400 text-xs">Genre</div><div class="font-bold">${campaign.genre}</div></div>
                        <div><div class="text-gray-400 text-xs">Budget</div><div class="font-bold text-pink-400">${c}${campaign.budget.toLocaleString()}</div></div>
                        <div><div class="text-gray-400 text-xs">Type</div><div class="font-bold text-xs">${s.campaign_type||'Indie'}</div></div>
                    </div>
                </div>
            `;

            if (s.realistic_expectations) {
                html += `
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="section-card rounded-xl p-4"><div class="text-gray-400 text-xs mb-1">Streams</div><div class="text-2xl font-black text-pink-400">${s.realistic_expectations.streams_30_days}</div></div>
                        <div class="section-card rounded-xl p-4"><div class="text-gray-400 text-xs mb-1">Followers</div><div class="text-2xl font-black text-purple-400">${s.realistic_expectations.new_followers}</div></div>
                        <div class="section-card rounded-xl p-4"><div class="text-gray-400 text-xs mb-1">Playlists</div><div class="text-2xl font-black text-blue-400">${s.realistic_expectations.playlist_adds}</div></div>
                        <div class="section-card rounded-xl p-4"><div class="text-gray-400 text-xs mb-1">ROI</div><div class="text-2xl font-black text-green-400">${s.realistic_expectations.roi_percentage}</div></div>
                    </div>
                `;
            }

            if (s.budget_breakdown) {
                html += `<div class="section-card rounded-xl p-6 mb-6"><h4 class="font-bold text-lg mb-4">💰 Budget Allocation</h4><div class="grid md:grid-cols-3 gap-4">`;
                Object.keys(s.budget_breakdown).forEach(k => {
                    if (k !== 'total') {
                        const label = k.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        html += `<div class="bg-black/40 rounded-lg p-4"><div class="text-xs text-gray-400">${label}</div><div class="font-black text-xl text-pink-400">${s.budget_breakdown[k]}</div></div>`;
                    }
                });
                html += `</div></div>`;
            }

            const sections = [
                { key: 'market_research', icon: '📊', title: 'Market Research' },
                { key: 'influencer_strategy', icon: '👥', title: 'Influencer Strategy' },
                { key: 'content_strategy', icon: '📱', title: 'Content Strategy' },
                { key: 'playlist_strategy', icon: '🎵', title: 'Playlist Strategy' },
                { key: 'action_plan', icon: '📅', title: 'Action Plan' },
                { key: 'roi_projections', icon: '💰', title: 'ROI Projections' }
            ];

            sections.forEach(sec => {
                if (s[sec.key]) {
                    let text = typeof s[sec.key] === 'string' ? s[sec.key] : JSON.stringify(s[sec.key], null, 2);
                    html += `<div class="section-card rounded-xl p-6 mb-4"><h4 class="font-bold text-lg mb-3">${sec.icon} ${sec.title}</h4><div class="text-sm text-gray-300 whitespace-pre-wrap">${text.substring(0,1500)}</div></div>`;
                }
            });

            document.getElementById('campaign-results').innerHTML = html;
            document.getElementById('results-section').style.display = 'block';
            document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
        }

        function logout() {
            supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        function executeWorkflow() {
            if (!currentCampaign) return alert('Generate campaign first!');
            
            const btn = document.getElementById('workflow-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Creating...';
            
            fetch('/api/generate-workflow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ campaign: currentCampaign })
            })
            .then(res => res.json())
            .then(async data => {
                if (data.success) {
                    const { data: wf } = await supabase.from('workflows').insert([{
                        user_id: currentUser.id,
                        campaign_id: currentCampaign.id,
                        tasks: data.workflow.tasks,
                        completed_tasks: [],
                        budget_spent: 0,
                        progress: 0
                    }]).select().single();

                    localStorage.setItem('sparkam_current_workflow', JSON.stringify(wf));
                    window.location.href = 'workflow.html';
                }
            })
            .catch(e => alert('Error: ' + e.message))
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-rocket mr-2"></i>Execute Workflow';
            });
        }

        function downloadPDF() {
            if (!currentCampaign) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const s = currentCampaign.strategy;
            let y = 20;
            
            doc.setFontSize(20);
            doc.text('SPARKAM CAMPAIGN', 20, y);
            y += 10;
            doc.setFontSize(14);
            doc.text(`"${currentCampaign.track_title}" by ${currentCampaign.artist_name}`, 20, y);
            y += 15;
            
            if (s.realistic_expectations) {
                doc.setFontSize(12);
                doc.text('Expected Results:', 20, y); y += 7;
                doc.setFontSize(10);
                doc.text(`Streams: ${s.realistic_expectations.streams_30_days}`, 20, y); y += 6;
                doc.text(`Followers: ${s.realistic_expectations.new_followers}`, 20, y); y += 6;
                doc.text(`Playlists: ${s.realistic_expectations.playlist_adds}`, 20, y); y += 10;
            }
            
            doc.save(`Sparkam_${currentCampaign.track_title}.pdf`);
        }

        init();
    </script>
</body>
    </html>
