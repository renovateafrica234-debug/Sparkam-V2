<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0415; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spark-gradient { background: linear-gradient(90deg, #ff00cc, #3333ff); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 6px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #ff00cc; cursor: pointer; }
    </style>
</head>
<body class="p-6">
    <nav class="max-w-7xl mx-auto flex justify-between mb-12">
        <div class="font-black text-xl tracking-tighter">SPARKAM<span class="text-pink-500">.</span></div>
        <div class="text-[10px] bg-pink-500/20 text-pink-500 px-4 py-2 rounded-full font-bold uppercase">Beta Tier</div>
    </nav>

    <div class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-6">
            <div class="glass p-8 rounded-3xl">
                <h3 class="font-bold text-sm mb-6 uppercase tracking-widest text-gray-400">Song Analysis</h3>
                <input type="text" id="artist" placeholder="Artist Name" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-3 outline-none focus:border-pink-500 text-sm">
                <input type="text" id="track" placeholder="Track Title" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl mb-6 outline-none focus:border-pink-500 text-sm">
                
                <h3 class="font-bold text-sm mb-4 uppercase tracking-widest text-gray-400">Promo Budget</h3>
                <div class="text-3xl font-black mb-4">₦<span id="budgetValue">14,000</span></div>
                <input type="range" min="14000" max="15000000" step="1000" value="14000" class="w-full mb-6" id="budgetSlider">
                
                <button onclick="runBrain()" id="run-btn" class="spark-gradient w-full py-4 rounded-xl font-black uppercase text-xs tracking-widest">Calibrate Reach</button>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="glass p-8 rounded-3xl min-h-[500px]">
                <div class="flex items-center gap-3 mb-8">
                    <i class="fa-solid fa-brain text-pink-500 text-xl"></i>
                    <h2 class="text-xl font-black uppercase">360° AI Blueprint</h2>
                </div>
                <div id="ai-output" class="text-gray-400 text-sm leading-relaxed whitespace-pre-wrap">
                    Enter song details and hit 'Calibrate' to see your autonomous promo plan...
                </div>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('budgetSlider');
        const budgetVal = document.getElementById('budgetValue');
        slider.oninput = function() { budgetVal.innerText = new Intl.NumberFormat().format(this.value); }

        async function runBrain() {
            const artist = document.getElementById('artist').value;
            const track = document.getElementById('track').value;
            const btn = document.getElementById('run-btn');
            const output = document.getElementById('ai-output');

            if(!artist || !track) return alert("Fill in the music details!");

            btn.innerText = "BRAIN CALIBRATING...";
            btn.disabled = true;
            output.innerHTML = `<div class="animate-pulse">Analyzing real-time reach for ₦${budgetVal.innerText}...</div>`;

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ artist, track, budget: budgetVal.innerText })
                });
                const data = await response.json();
                output.innerText = data.strategy;
            } catch (e) {
                output.innerText = "Error connecting to AI Brain.";
            } finally {
                btn.innerText = "Calibrate Reach";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
