<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spark-btn {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
        }
    </style>
</head>
<body class="min-h-screen">
    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="text-2xl font-black gradient-text">SPARKAM</div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <h1 class="text-4xl font-black mb-8">Dashboard</h1>

        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-black mb-6">Generate Campaign</h2>
            <form id="campaign-form" class="grid md:grid-cols-2 gap-6">
                <input type="text" id="artistName" placeholder="Artist Name" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white" required>
                <input type="text" id="trackTitle" placeholder="Track Title" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white" required>
                <select id="genre" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white" required>
                    <option value="">Select Genre</option>
                    <option value="Afropop">Afropop</option>
                    <option value="Hip-Hop">Hip-Hop</option>
                </select>
                <input type="number" id="budget" value="150000" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white" required>
                <button type="submit" id="spark-btn" class="md:col-span-2 spark-btn py-4 rounded-xl font-bold">SPARK IT</button>
            </form>
        </div>

        <div id="results-section" class="glass rounded-3xl p-8" style="display: none;">
            <div class="bg-green-500/20 border-2 border-green-500 rounded-2xl p-6 mb-6">
                <h2 class="text-2xl font-black mb-4">Campaign Ready!</h2>
                <div class="flex gap-4">
                    <button onclick="executeWorkflow()" id="workflow-btn" class="px-8 py-4 bg-green-500 hover:bg-green-600 rounded-xl font-black text-lg">
                        🚀 EXECUTE WORKFLOW
                    </button>
                    <button class="px-6 py-4 spark-btn rounded-xl font-bold">📄 PDF</button>
                </div>
            </div>
            <div id="campaign-results"></div>
        </div>
    </div>

    <script>
        let currentCampaign = null;

        document.getElementById('campaign-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('spark-btn');
            btn.disabled = true;
            btn.textContent = 'GENERATING...';
            
            try {
                const response = await fetch('/api/generate-campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        artistName: document.getElementById('artistName').value,
                        trackTitle: document.getElementById('trackTitle').value,
                        genre: document.getElementById('genre').value,
                        budget: parseInt(document.getElementById('budget').value)
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    currentCampaign = data.campaign;
                    document.getElementById('results-section').style.display = 'block';
                    document.getElementById('campaign-results').innerHTML = '<p>Campaign generated! Click Execute Workflow above.</p>';
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'SPARK IT';
            }
        });

        async function executeWorkflow() {
            console.log('🚀 EXECUTE WORKFLOW CLICKED');
            console.log('Campaign data:', currentCampaign);
            
            const btn = document.getElementById('workflow-btn');
            btn.disabled = true;
            btn.innerHTML = '⏳ CREATING WORKFLOW...';
            
            try {
                console.log('Calling /api/generate-workflow...');
                
                const response = await fetch('/api/generate-workflow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campaign: currentCampaign })
                });
                
                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response data:', data);
                
                if (data.success) {
                    console.log('✅ SUCCESS! Saving workflow...');
                    localStorage.setItem('sparkam_current_workflow', JSON.stringify(data.workflow));
                    console.log('Redirecting to workflow.html...');
                    window.location.href = 'workflow.html';
                } else {
                    console.error('❌ API Error:', data.error);
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('❌ Network Error:', error);
                alert('Network error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 EXECUTE WORKFLOW';
            }
        }
    </script>
</body>
                </html>
