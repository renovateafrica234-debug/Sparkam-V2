<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkam Dashboard - AI Campaign Generator</title>
  
  <!-- Add html2canvas for image export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Add jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a12;
      color: white;
      min-height: 100vh;
      display: flex;
    }
    
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #050508;
      padding: 40px 30px;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    
    .logo {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 60px;
      color: white;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 20px;
      margin: 10px 0;
      border-radius: 12px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .nav-item.active {
      background: rgba(255, 0, 102, 0.1);
      color: #FF0066;
    }
    
    .nav-icon { font-size: 20px; }
    
    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      padding: 40px;
      gap: 40px;
    }
    
    .form-section {
      flex: 1;
      max-width: 700px;
    }
    
    h1 {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }
    
    .beta-badge {
      display: inline-block;
      background: rgba(255, 0, 102, 0.2);
      color: #FF0066;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    
    .form-container {
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
    }
    
    .form-group { margin-bottom: 25px; }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    
    input, select {
      width: 100%;
      padding: 16px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      transition: all 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #FF0066;
      background: rgba(255,255,255,0.05);
    }
    
    input::placeholder { color: rgba(255,255,255,0.3); }
    select { cursor: pointer; }
    select option { background: #12121a; color: white; }
    
    /* Budget Section */
    .budget-section {
      margin: 35px 0;
      padding: 30px;
      background: rgba(255, 0, 102, 0.03);
      border: 1px solid rgba(255, 0, 102, 0.15);
      border-radius: 20px;
    }
    
    .budget-label {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    
    .budget-display {
      text-align: center;
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #FF0066 0%, #9D4EDD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 25px;
    }
    
    input[type="range"] {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
      border: none;
      margin-bottom: 15px;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #FF0066 0%, #6366F1 100%);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 0, 102, 0.5);
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #FF0066 0%, #6366F1 100%);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .budget-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }
    
    /* Spark Button */
    .spark-btn {
      width: 100%;
      padding: 22px;
      background: linear-gradient(135deg, #FF0066 0%, #6366F1 100%);
      border: none;
      border-radius: 16px;
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: all 0.3s;
      margin-top: 30px;
      position: relative;
      overflow: hidden;
    }
    
    .spark-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 50px rgba(255, 0, 102, 0.4);
    }
    
    .spark-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .spark-btn.loading::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 1.5s infinite;
    }
    
    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }
    
    /* Status Messages */
    .status-message {
      margin-top: 25px;
      padding: 20px;
      border-radius: 14px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    
    .status-message.show { display: block; }
    
    .status-message.loading {
      background: rgba(157, 78, 221, 0.1);
      border: 1px solid rgba(157, 78, 221, 0.3);
      color: #9D4EDD;
    }
    
    .status-message.error {
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: #ff6666;
    }
    
    .status-message.success {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: #00ff88;
    }
    
    /* Results */
    .results {
      display: none;
      margin-top: 40px;
      animation: fadeIn 0.5s;
    }
    
    .results.show { display: block; }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .result-card {
      background: #12121a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 35px;
      margin: 20px 0;
    }
    
    .result-card h3 {
      color: #FF0066;
      font-size: 18px;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .platform-item {
      background: rgba(157, 78, 221, 0.05);
      border-left: 3px solid #9D4EDD;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
    }
    
    /* EXPORT BUTTONS - NEW! */
    .export-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin: 30px 0;
      padding: 30px;
      background: rgba(255,255,255,0.02);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .export-btn {
      padding: 16px 24px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      color: white;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .export-btn:hover {
      border-color: #FF0066;
      background: rgba(255, 0, 102, 0.1);
      transform: translateY(-2px);
    }
    
    .export-btn:active {
      transform: translateY(0);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 20px; flex-direction: column; }
      .form-section { max-width: 100%; }
      h1 { font-size: 32px; }
      .export-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">SPARKAM.</div>
    <div class="nav-item active">
      <span class="nav-icon">🎯</span>
      <span>AI ANALYSIS</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">✍️</span>
      <span>CONTENT CREATOR</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">📱</span>
      <span>SOCIAL MEDIA</span>
    </div>
  </div>
  
  <!-- Main Content -->
  <div class="main">
    <div class="form-section">
      <h1>AI STRATEGY ANALYSIS</h1>
      <span class="beta-badge">BETA - FREE</span>
      
      <div class="form-container">
        <form id="sparkForm">
          <div class="form-group">
            <label>Artist Name</label>
            <input type="text" id="artistName" placeholder="Artist Name" required>
          </div>
          
          <div class="form-group">
            <label>Track Title</label>
            <input type="text" id="trackTitle" placeholder="Track Title" required>
          </div>
          
          <div class="form-group">
            <label>Genre</label>
            <select id="genre" required>
              <option value="">Select Genre</option>
              <option value="Afrobeats">Afrobeats</option>
              <option value="Afropop">Afropop</option>
              <option value="Hip-Hop">Hip-Hop</option>
              <option value="R&B">R&B</option>
              <option value="Pop">Pop</option>
              <option value="Amapiano">Amapiano</option>
            </select>
          </div>
          
          <div class="budget-section">
            <div class="budget-label">PROMO BUDGET</div>
            <div class="budget-display">₦<span id="budgetAmount">14,000</span></div>
            <input type="range" id="budgetSlider" min="3000" max="500000" value="14000" step="1000">
            <div class="budget-info">
              <span>₦3K</span>
              <span>₦50K</span>
              <span>₦500K</span>
            </div>
          </div>
          
          <button type="submit" class="spark-btn" id="sparkBtn">SPARK IT</button>
        </form>
        
        <div class="status-message" id="statusMessage"></div>
        
        <!-- Results Section with Export Buttons -->
        <div class="results" id="results">
          <!-- Campaign results will be inserted here -->
        </div>
      </div>
    </div>
  </div>
  
  <script>
    console.log('🎵 Sparkam Dashboard with Export Features Loaded');
    
    // Budget slider
    const budgetSlider = document.getElementById('budgetSlider');
    const budgetDisplay = document.getElementById('budgetAmount');
    
    budgetSlider.addEventListener('input', (e) => {
      const value = parseInt(e.target.value);
      budgetDisplay.textContent = value.toLocaleString();
    });
    
    // Form submission
    const sparkForm = document.getElementById('sparkForm');
    const sparkBtn = document.getElementById('sparkBtn');
    const statusMessage = document.getElementById('statusMessage');
    const resultsDiv = document.getElementById('results');
    
    sparkForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        artistName: document.getElementById('artistName').value.trim(),
        trackTitle: document.getElementById('trackTitle').value.trim(),
        genre: document.getElementById('genre').value,
        budget: parseInt(budgetSlider.value)
      };
      
      console.log('🚀 Sparking campaign:', formData);
      
      // Update UI
      sparkBtn.disabled = true;
      sparkBtn.textContent = 'SPARKING...';
      sparkBtn.classList.add('loading');
      showStatus('loading', '🧠 AI Brain is analyzing...');
      resultsDiv.classList.remove('show');
      
      try {
        const response = await fetch('/api/promote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        console.log('Response:', response.status);
        
        if (!response.ok) {
          throw new Error(`API Error: ${response.status}`);
        }
        
        const result = await response.json();
        console.log('Result:', result);
        
        if (result.success && result.campaign) {
          showStatus('success', '✨ Campaign Generated!');
          displayResults(result.campaign, formData);
        } else {
          throw new Error(result.error || 'Generation failed');
        }
        
      } catch (error) {
        console.error('Error:', error);
        showStatus('error', `❌ ${error.message}`);
      } finally {
        sparkBtn.disabled = false;
        sparkBtn.textContent = 'SPARK IT';
        sparkBtn.classList.remove('loading');
      }
    });
    
    function showStatus(type, message) {
      statusMessage.className = `status-message ${type} show`;
      statusMessage.textContent = message;
    }
    
    function displayResults(campaign, formData) {
      const html = `
        <div id="campaignContent">
          <div style="background: linear-gradient(135deg, rgba(255,0,102,0.1) 0%, rgba(99,102,241,0.1) 100%); padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 25px;">
            <h2 style="font-size: 32px; margin-bottom: 10px;">🎉 Campaign Sparked!</h2>
            <p style="font-size: 18px; color: rgba(255,255,255,0.8);">
              "${formData.trackTitle}" by ${formData.artistName}
            </p>
            <p style="font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 8px;">
              ${formData.genre} • ₦${formData.budget.toLocaleString()}
            </p>
          </div>
          
          <div class="result-card">
            <h3>Strategy Overview</h3>
            <p style="color: rgba(255,255,255,0.8); line-height: 1.7;">
              ${campaign.overview}
            </p>
          </div>
          
          <div class="result-card">
            <h3>Platform Strategies</h3>
            ${campaign.platforms.map(p => `
              <div class="platform-item">
                <strong style="color: #9D4EDD; font-size: 16px; display: block; margin-bottom: 8px;">
                  ${p.platform.toUpperCase()}
                </strong>
                <div style="color: #FF0066; font-size: 24px; font-weight: 900; margin: 8px 0;">
                  ₦${p.budget.toLocaleString()}
                </div>
                <p style="color: rgba(255,255,255,0.7); line-height: 1.6;">
                  ${p.tactics.join(' • ')}
                </p>
              </div>
            `).join('')}
          </div>
          
          ${campaign.content ? `
            <div class="result-card">
              <h3>Content Ideas</h3>
              ${campaign.content.captions.map((c, i) => `
                <div style="background: rgba(255,255,255,0.03); padding: 18px; border-radius: 10px; margin: 12px 0;">
                  <div style="color: #FF0066; font-size: 11px; font-weight: 700; margin-bottom: 8px;">CAPTION ${i+1}</div>
                  <div style="color: rgba(255,255,255,0.8);">${c}</div>
                </div>
              `).join('')}
            </div>
            
            <div class="result-card">
              <h3>Hashtags</h3>
              <div style="color: #9D4EDD; font-size: 16px; line-height: 2;">
                ${campaign.content.hashtags.join(' ')}
              </div>
            </div>
          ` : ''}
        </div>
        
        <!-- EXPORT BUTTONS -->
        <div class="export-actions">
          <button onclick="downloadPDF()" class="export-btn">
            📥 Download PDF
          </button>
          <button onclick="copyToClipboard()" class="export-btn">
            📋 Copy Text
          </button>
          <button onclick="shareAsImage()" class="export-btn">
            🎨 Share Image
          </button>
        </div>
        
        <!-- SPARK ANOTHER BUTTON -->
        <button onclick="sparkAnother()" class="spark-btn" style="margin-top: 25px;">
          ✨ Spark Another (Free Beta)
        </button>
      `;
      
      resultsDiv.innerHTML = html;
      resultsDiv.classList.add('show');
      resultsDiv.scrollIntoView({ behavior: 'smooth' });
      
      // Store campaign data globally for export functions
      window.currentCampaign = { campaign, formData };
    }
    
    // EXPORT FUNCTIONS
    
    // 1. Download as PDF
    window.downloadPDF = function() {
      const content = document.getElementById('campaignContent');
      const { jsPDF } = window.jspdf;
      
      html2canvas(content, { 
        backgroundColor: '#12121a',
        scale: 2 
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgWidth = 190;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;
        
        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
        pdf.save(`Sparkam-Campaign-${window.currentCampaign.formData.trackTitle}.pdf`);
        
        alert('✅ PDF downloaded!');
      });
    };
    
    // 2. Copy to Clipboard
    window.copyToClipboard = function() {
      const { campaign, formData } = window.currentCampaign;
      
      let text = `🎵 SPARKAM CAMPAIGN
      
Track: "${formData.trackTitle}" by ${formData.artistName}
Genre: ${formData.genre}
Budget: ₦${formData.budget.toLocaleString()}

📊 STRATEGY OVERVIEW:
${campaign.overview}

💰 PLATFORM BREAKDOWN:
${campaign.platforms.map(p => `
${p.platform.toUpperCase()}: ₦${p.budget.toLocaleString()}
${p.tactics.join(' • ')}
`).join('\n')}

${campaign.content ? `
✍️ CONTENT IDEAS:
${campaign.content.captions.map((c, i) => `${i+1}. ${c}`).join('\n\n')}

🏷️ HASHTAGS:
${campaign.content.hashtags.join(' ')}
` : ''}

Generated by Sparkam AI - sparkam.app
      `;
      
      navigator.clipboard.writeText(text).then(() => {
        alert('✅ Campaign copied to clipboard!');
      });
    };
    
    // 3. Share as Image (generates collage-style graphic)
    window.shareAsImage = function() {
      const content = document.getElementById('campaignContent');
      
      html2canvas(content, {
        backgroundColor: '#12121a',
        scale: 2
      }).then(canvas => {
        canvas.toBlob(blob => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `Sparkam-${window.currentCampaign.formData.trackTitle}.png`;
          a.click();
          URL.revokeObjectURL(url);
          
          alert('✅ Image downloaded! Share on Instagram/WhatsApp!');
        });
      });
    };
    
    // SPARK ANOTHER FUNCTION
    window.sparkAnother = function() {
      // For BETA: Just reload to create another campaign (free)
      // For PAID version: Check credits and redirect to checkout if needed
      
      const isBeta = true; // Change to false after beta
      
      if (isBeta) {
        // Free beta - just reload dashboard
        location.reload();
      } else {
        // Paid version logic (implement later)
        const hasCredits = checkUserCredits(); // Implement this function
        if (hasCredits) {
          location.reload();
        } else {
          window.location.href = '/pricing?reason=out-of-credits';
        }
      }
    };
    
    console.log('✅ Dashboard ready with export features');
  </scrip
