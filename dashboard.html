<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- PDF Generation Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spark-btn {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black gradient-text">SPARKAM</div>
            <div class="flex items-center gap-6">
                <span class="text-sm text-gray-400" id="user-email">Loading...</span>
                <span id="tier-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-pink-500/20 text-pink-400">PRO</span>
                <a href="/profile.html" class="text-gray-400 hover:text-white"><i class="fa-solid fa-user"></i></a>
                <button onclick="logout()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-sign-out"></i></button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Welcome Banner -->
        <div class="mb-8">
            <h1 class="text-4xl font-black mb-2">
                Welcome back, <span class="gradient-text" id="artist-name">Artist</span>!
            </h1>
            <p class="text-gray-400">Ready to spark your next campaign?</p>
        </div>

        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Total Campaigns</div>
                <div class="text-3xl font-black gradient-text" id="total-campaigns">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">This Month</div>
                <div class="text-3xl font-black text-pink-400" id="month-campaigns">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Chat Messages</div>
                <div class="text-3xl font-black text-purple-400" id="chat-count">0</div>
                <div class="text-xs text-gray-500 mt-1">Unlimited</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Account Status</div>
                <div class="text-lg font-black text-green-400">Active</div>
            </div>
        </div>

        <!-- Campaign Generator -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-bolt text-pink-500 mr-2"></i>
                Generate New Campaign
            </h2>

            <form id="campaign-form" class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Artist Name</label>
                    <input type="text" id="artistName" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" placeholder="e.g. Zeeter Oliver" required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Track Title</label>
                    <input type="text" id="trackTitle" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" placeholder="e.g. Freedom" required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Genre</label>
                    <select id="genre" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" required>
                        <option value="">Select genre</option>
                        <option value="Afropop">Afropop</option>
                        <option value="Afrobeats">Afrobeats</option>
                        <option value="Alté">Alté</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="R&B">R&B</option>
                        <option value="Gospel">Gospel</option>
                        <option value="Amapiano">Amapiano</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Budget (₦)</label>
                    <input type="number" id="budget" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" placeholder="50000" min="10000" value="50000" required>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2">Spotify/DSP Link (Optional)</label>
                    <input type="url" id="dspLink" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" placeholder="https://open.spotify.com/...">
                </div>

                <div class="flex items-end">
                    <button type="submit" id="spark-btn" class="w-full spark-btn py-4 rounded-xl font-bold text-lg uppercase tracking-wide hover:opacity-90 transition">
                        <i class="fa-solid fa-bolt mr-2"></i>SPARK IT
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div id="results-section" class="glass rounded-3xl p-8 mb-8" style="display: none;">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-check-circle text-green-400 mr-2"></i>
                Campaign Generated Successfully!
            </h2>
            
            <div id="campaign-results" class="space-y-6">
                <!-- Campaign details will be inserted here -->
            </div>

            <div class="flex gap-4 mt-6">
                <button onclick="downloadPDF()" class="px-6 py-3 spark-btn rounded-xl font-bold">
                    <i class="fa-solid fa-download mr-2"></i>Download PDF
                </button>
                <button onclick="toggleCampaignView()" class="px-6 py-3 border-2 border-pink-500 rounded-xl font-bold hover:bg-pink-500/10">
                    <i class="fa-solid fa-eye mr-2"></i><span id="view-btn-text">View Full Campaign</span>
                </button>
            </div>
        </div>

        <!-- Recent Campaigns -->
        <div class="glass rounded-3xl p-8">
            <h2 class="text-2xl font-black mb-6">Recent Campaigns</h2>
            <div id="campaigns-list" class="text-center text-gray-400 py-12">
                <i class="fa-solid fa-folder-open text-6xl mb-4 opacity-20"></i>
                <p>No campaigns yet. Generate your first one above!</p>
            </div>
        </div>
    </div>

    <script>
        let currentCampaign = null;
        let campaignExpanded = false;

        window.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadCampaigns();
        });

        function loadUserData() {
            const user = JSON.parse(localStorage.getItem('sparkam_user') || '{}');
            if (user.artistName) document.getElementById('artist-name').textContent = user.artistName;
            if (user.email) document.getElementById('user-email').textContent = user.email;
            if (user.tier) document.getElementById('tier-badge').textContent = user.tier.toUpperCase();
        }

        function loadCampaigns() {
            const campaigns = JSON.parse(localStorage.getItem('sparkam_campaigns') || '[]');
            document.getElementById('total-campaigns').textContent = campaigns.length;
            
            if (campaigns.length > 0) {
                displayCampaigns(campaigns);
            }
        }

        function displayCampaigns(campaigns) {
            const listEl = document.getElementById('campaigns-list');
            listEl.innerHTML = campaigns.map(c => `
                <div class="glass rounded-xl p-4 mb-4 text-left">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${c.trackTitle}</h3>
                            <p class="text-sm text-gray-400">${c.artistName} • ${c.genre}</p>
                        </div>
                        <button onclick="viewSavedCampaign('${c.id}')" class="text-pink-500">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Handle form submission - NO ALERT POPUP!
        document.getElementById('campaign-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                artistName: document.getElementById('artistName').value.trim(),
                trackTitle: document.getElementById('trackTitle').value.trim(),
                genre: document.getElementById('genre').value,
                budget: parseInt(document.getElementById('budget').value),
                dspLink: document.getElementById('dspLink').value.trim()
            };
            
            if (!formData.artistName || !formData.trackTitle || !formData.genre) {
                showNotification('Please fill in all required fields', 'error');
                return;
            }
            
            const btn = document.getElementById('spark-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>GENERATING...';
            
            try {
                const response = await fetch('/api/generate-campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    currentCampaign = data.campaign;
                    displayCampaignResults(data.campaign);
                    saveCampaign(data.campaign);
                    // NO ALERT! Just show results
                } else {
                    showNotification('Error: ' + (data.error || 'Failed to generate campaign'), 'error');
                }
                
            } catch (error) {
                showNotification('Network error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function displayCampaignResults(campaign) {
            const resultsSection = document.getElementById('results-section');
            const resultsDiv = document.getElementById('campaign-results');
            
            const strategy = campaign.strategy;
            
            // Summary card
            let html = `
                <div class="bg-black/30 rounded-xl p-6">
                    <h3 class="text-2xl font-bold mb-4">"${campaign.trackTitle}" by ${campaign.artistName}</h3>
                    <div class="grid md:grid-cols-3 gap-4 text-sm">
                        <div>
                            <div class="text-gray-400">Genre</div>
                            <div class="font-bold">${campaign.genre}</div>
                        </div>
                        <div>
                            <div class="text-gray-400">Budget</div>
                            <div class="font-bold">₦${campaign.budget.toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="text-gray-400">AI Model</div>
                            <div class="font-bold text-xs">${campaign.ai_model || 'Powered by AI'}</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Campaign overview
            if (strategy.campaign_overview) {
                html += `
                    <div class="bg-black/30 rounded-xl p-6" id="campaign-details">
                        <h4 class="font-bold text-lg mb-3 text-pink-400">📋 Campaign Overview</h4>
                        <p class="text-gray-300 text-sm leading-relaxed">${strategy.campaign_overview}</p>
                    </div>
                `;
            }
            
            resultsDiv.innerHTML = html;
            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
            campaignExpanded = false;
        }

        function toggleCampaignView() {
            if (!currentCampaign) return;
            
            const detailsDiv = document.getElementById('campaign-details');
            const btnText = document.getElementById('view-btn-text');
            const strategy = currentCampaign.strategy;
            
            if (campaignExpanded) {
                // Collapse - show only overview
                detailsDiv.innerHTML = `
                    <h4 class="font-bold text-lg mb-3 text-pink-400">📋 Campaign Overview</h4>
                    <p class="text-gray-300 text-sm leading-relaxed">${strategy.campaign_overview || 'Campaign overview'}</p>
                `;
                btnText.textContent = 'View Full Campaign';
                campaignExpanded = false;
            } else {
                // Expand - show everything
                let fullHTML = `<h4 class="font-bold text-lg mb-3 text-pink-400">📋 Full Campaign Strategy</h4>`;
                
                // Add all sections
                Object.keys(strategy).forEach(key => {
                    const value = strategy[key];
                    if (typeof value === 'object' && value !== null) {
                        fullHTML += `<div class="mt-4"><h5 class="font-bold text-white mb-2">${formatKey(key)}</h5>`;
                        fullHTML += formatObject(value);
                        fullHTML += '</div>';
                    } else if (key !== 'campaign_overview') {
                        fullHTML += `<div class="mt-4"><h5 class="font-bold text-white mb-2">${formatKey(key)}</h5>`;
                        fullHTML += `<p class="text-gray-300 text-sm">${value}</p></div>`;
                    }
                });
                
                detailsDiv.innerHTML = fullHTML;
                btnText.textContent = 'Hide Details';
                campaignExpanded = true;
            }
        }

        function formatKey(key) {
            return key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function formatObject(obj) {
            let html = '<div class="text-sm text-gray-300 space-y-2">';
            Object.keys(obj).forEach(key => {
                const value = obj[key];
                if (Array.isArray(value)) {
                    html += `<div><strong>${formatKey(key)}:</strong><ul class="list-disc list-inside ml-4 mt-1">`;
                    value.slice(0, 10).forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    if (value.length > 10) html += `<li class="text-gray-500">...and ${value.length - 10} more</li>`;
                    html += '</ul></div>';
                } else {
                    html += `<div><strong>${formatKey(key)}:</strong> ${value}</div>`;
                }
            });
            html += '</div>';
            return html;
        }

        function downloadPDF() {
            if (!currentCampaign) return;
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Title
            doc.setFontSize(20);
            doc.setTextColor(255, 0, 204);
            doc.text('SPARKAM CAMPAIGN', 20, 20);
            
            // Campaign info
            doc.setFontSize(16);
            doc.setTextColor(0, 0, 0);
            doc.text(`"${currentCampaign.trackTitle}" by ${currentCampaign.artistName}`, 20, 35);
            
            doc.setFontSize(12);
            doc.text(`Genre: ${currentCampaign.genre}`, 20, 45);
            doc.text(`Budget: ₦${currentCampaign.budget.toLocaleString()}`, 20, 52);
            doc.text(`Generated: ${new Date(currentCampaign.createdAt).toLocaleDateString()}`, 20, 59);
            
            // Overview
            doc.setFontSize(14);
            doc.setTextColor(255, 0, 204);
            doc.text('Campaign Overview:', 20, 70);
            
            doc.setFontSize(10);
            doc.setTextColor(0, 0, 0);
            const overview = currentCampaign.strategy.campaign_overview || 'Full campaign details';
            const splitOverview = doc.splitTextToSize(overview, 170);
            doc.text(splitOverview, 20, 78);
            
            // Footer
            doc.setFontSize(8);
            doc.setTextColor(128, 128, 128);
            doc.text('Generated by Sparkam - AI Music Promotion Platform', 20, 285);
            doc.text('sparkam.ai | hello@sparkam.ai', 20, 290);
            
            // Download
            doc.save(`Sparkam_Campaign_${currentCampaign.trackTitle.replace(/\s/g, '_')}.pdf`);
            
            showNotification('PDF downloaded successfully!', 'success');
        }

        function saveCampaign(campaign) {
            const campaigns = JSON.parse(localStorage.getItem('sparkam_campaigns') || '[]');
            campaigns.unshift({
                id: Date.now(),
                ...campaign
            });
            localStorage.setItem('sparkam_campaigns', JSON.stringify(campaigns.slice(0, 10)));
            loadCampaigns();
        }

        function viewSavedCampaign(id) {
            const campaigns = JSON.parse(localStorage.getItem('sparkam_campaigns') || '[]');
            const campaign = campaigns.find(c => c.id == id);
            if (campaign) {
                currentCampaign = campaign;
                displayCampaignResults(campaign);
            }
        }

        function showNotification(message, type) {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.className = `fixed top-4 right-4 px-6 py-4 rounded-xl font-bold text-sm z-50 ${
                type === 'error' ? 'bg-red-500' : 'bg-green-500'
            }`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }
    </script>
</body>
                            </html>
