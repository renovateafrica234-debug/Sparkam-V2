<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .spark-btn {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black gradient-text">SPARKAM</div>
            <div class="flex items-center gap-6">
                <span class="text-sm text-gray-400" id="user-email">Loading...</span>
                <span id="tier-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-pink-500/20 text-pink-400">
                    PRO
                </span>
                <a href="/profile.html" class="text-gray-400 hover:text-white">
                    <i class="fa-solid fa-user"></i>
                </a>
                <button onclick="logout()" class="text-gray-400 hover:text-white">
                    <i class="fa-solid fa-sign-out"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Welcome Banner -->
        <div class="mb-8">
            <h1 class="text-4xl font-black mb-2">
                Welcome back, <span class="gradient-text" id="artist-name">Artist</span>!
            </h1>
            <p class="text-gray-400">Ready to spark your next campaign?</p>
        </div>

        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Total Campaigns</div>
                <div class="text-3xl font-black gradient-text" id="total-campaigns">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">This Month</div>
                <div class="text-3xl font-black text-pink-400" id="month-campaigns">0</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Chat Messages</div>
                <div class="text-3xl font-black text-purple-400" id="chat-count">0</div>
                <div class="text-xs text-gray-500 mt-1">Unlimited</div>
            </div>
            <div class="glass rounded-2xl p-6">
                <div class="text-gray-400 text-sm mb-2">Account Status</div>
                <div class="text-lg font-black text-green-400">Active</div>
            </div>
        </div>

        <!-- Campaign Generator -->
        <div class="glass rounded-3xl p-8 mb-8">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-bolt text-pink-500 mr-2"></i>
                Generate New Campaign
            </h2>

            <form id="campaign-form" class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold mb-2">Artist Name</label>
                    <input 
                        type="text" 
                        id="artistName" 
                        class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" 
                        placeholder="e.g. Zeeter Oliver"
                        required
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Track Title</label>
                    <input 
                        type="text" 
                        id="trackTitle" 
                        class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" 
                        placeholder="e.g. Freedom"
                        required
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Genre</label>
                    <select 
                        id="genre" 
                        class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500"
                        required
                    >
                        <option value="">Select genre</option>
                        <option value="Afropop">Afropop</option>
                        <option value="Afrobeats">Afrobeats</option>
                        <option value="Alté">Alté</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="R&B">R&B</option>
                        <option value="Gospel">Gospel</option>
                        <option value="Amapiano">Amapiano</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-2">Budget (₦)</label>
                    <input 
                        type="number" 
                        id="budget" 
                        class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" 
                        placeholder="50000"
                        min="10000"
                        value="50000"
                        required
                    >
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2">Spotify/DSP Link (Optional)</label>
                    <input 
                        type="url" 
                        id="dspLink" 
                        class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-pink-500" 
                        placeholder="https://open.spotify.com/..."
                    >
                </div>

                <div class="flex items-end">
                    <button 
                        type="submit" 
                        id="spark-btn"
                        class="w-full spark-btn py-4 rounded-xl font-bold text-lg uppercase tracking-wide hover:opacity-90 transition"
                    >
                        <i class="fa-solid fa-bolt mr-2"></i>SPARK IT
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Section (Hidden until campaign generated) -->
        <div id="results-section" class="glass rounded-3xl p-8 mb-8" style="display: none;">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-check-circle text-green-400 mr-2"></i>
                Campaign Generated!
            </h2>
            
            <div id="campaign-results" class="space-y-4">
                <!-- Campaign details will be inserted here -->
            </div>

            <div class="flex gap-4 mt-6">
                <button onclick="downloadCampaign()" class="px-6 py-3 spark-btn rounded-xl font-bold">
                    <i class="fa-solid fa-download mr-2"></i>Download PDF
                </button>
                <button onclick="viewCampaign()" class="px-6 py-3 border-2 border-pink-500 rounded-xl font-bold hover:bg-pink-500/10">
                    <i class="fa-solid fa-eye mr-2"></i>View Full Campaign
                </button>
            </div>
        </div>

        <!-- Recent Campaigns -->
        <div class="glass rounded-3xl p-8">
            <h2 class="text-2xl font-black mb-6">Recent Campaigns</h2>
            <div id="campaigns-list" class="text-center text-gray-400 py-12">
                <i class="fa-solid fa-folder-open text-6xl mb-4 opacity-20"></i>
                <p>No campaigns yet. Generate your first one above!</p>
            </div>
        </div>
    </div>

    <script>
        // Load user data on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadCampaigns();
        });

        function loadUserData() {
            // Get user data from localStorage (or API)
            const user = JSON.parse(localStorage.getItem('sparkam_user') || '{}');
            
            if (user.artistName) {
                document.getElementById('artist-name').textContent = user.artistName;
            }
            if (user.email) {
                document.getElementById('user-email').textContent = user.email;
            }
            if (user.tier) {
                document.getElementById('tier-badge').textContent = user.tier.toUpperCase();
            }
        }

        function loadCampaigns() {
            // Load recent campaigns from API or localStorage
            const campaigns = JSON.parse(localStorage.getItem('sparkam_campaigns') || '[]');
            
            if (campaigns.length > 0) {
                displayCampaigns(campaigns);
            }
        }

        function displayCampaigns(campaigns) {
            const listEl = document.getElementById('campaigns-list');
            listEl.innerHTML = campaigns.map(c => `
                <div class="glass rounded-xl p-4 mb-4 text-left">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">${c.trackTitle}</h3>
                            <p class="text-sm text-gray-400">${c.artistName} • ${c.genre}</p>
                        </div>
                        <button onclick="viewCampaign('${c.id}')" class="text-pink-500">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Handle form submission - THE FIX IS HERE!
        document.getElementById('campaign-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // ← CRITICAL: Prevents page refresh!
            
            console.log('🚀 Spark It clicked!');
            
            // Get form values
            const formData = {
                artistName: document.getElementById('artistName').value.trim(),
                trackTitle: document.getElementById('trackTitle').value.trim(),
                genre: document.getElementById('genre').value,
                budget: parseInt(document.getElementById('budget').value),
                dspLink: document.getElementById('dspLink').value.trim()
            };
            
            console.log('Form data:', formData);
            
            // Validate
            if (!formData.artistName || !formData.trackTitle || !formData.genre) {
                alert('❌ Please fill in all required fields');
                return;
            }
            
            // Show loading state
            const btn = document.getElementById('spark-btn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>GENERATING...';
            
            try {
                // Call API to generate campaign
                const response = await fetch('/api/generate-campaign', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                console.log('API Response:', data);
                
                if (data.success) {
                    // Success! Show results
                    displayCampaignResults(data.campaign);
                    
                    // Save to localStorage
                    saveCampaign(data.campaign);
                    
                    // Show success message
                    alert('✅ Campaign generated successfully!');
                    
                } else {
                    // Error from API
                    console.error('API Error:', data.error);
                    alert('❌ Error: ' + (data.error || 'Failed to generate campaign'));
                }
                
            } catch (error) {
                console.error('Network Error:', error);
                alert('❌ Network error: ' + error.message + '\n\nPlease check:\n1. Internet connection\n2. API endpoint exists\n3. Anthropic API key is set');
            } finally {
                // Restore button
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function displayCampaignResults(campaign) {
            const resultsSection = document.getElementById('results-section');
            const resultsDiv = document.getElementById('campaign-results');
            
            resultsDiv.innerHTML = `
                <div class="bg-black/30 rounded-xl p-6">
                    <h3 class="text-xl font-bold mb-4">${campaign.trackTitle} by ${campaign.artistName}</h3>
                    <div class="grid md:grid-cols-3 gap-4 text-sm">
                        <div>
                            <div class="text-gray-400">Genre</div>
                            <div class="font-bold">${campaign.genre}</div>
                        </div>
                        <div>
                            <div class="text-gray-400">Budget</div>
                            <div class="font-bold">₦${campaign.budget.toLocaleString()}</div>
                        </div>
                        <div>
                            <div class="text-gray-400">Content Pieces</div>
                            <div class="font-bold">90+ pieces</div>
                        </div>
                    </div>
                </div>
                
                <div class="text-gray-400 text-sm mt-4">
                    <i class="fa-solid fa-info-circle mr-2"></i>
                    Campaign includes: TikTok strategy, Instagram plan, Spotify pitching guide, and influencer targets.
                </div>
            `;
            
            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function saveCampaign(campaign) {
            const campaigns = JSON.parse(localStorage.getItem('sparkam_campaigns') || '[]');
            campaigns.unshift({
                id: Date.now(),
                ...campaign,
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('sparkam_campaigns', JSON.stringify(campaigns.slice(0, 10)));
            loadCampaigns();
        }

        function downloadCampaign() {
            alert('📥 Download feature coming soon!');
        }

        function viewCampaign(id) {
            alert('👁️ View campaign feature coming soon!');
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = '/';
            }
        }
    </script>
</body>
    </html>
