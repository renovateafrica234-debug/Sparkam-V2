<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%); color: white; padding: 20px;">

    <h1>Dashboard</h1>
    <p>Welcome, <span id="user-name">Loading...</span></p>
    
    <form id="campaign-form" style="margin: 20px 0;">
        <input type="text" id="trackTitle" placeholder="Track Title" required style="padding: 10px; margin: 5px;"><br>
        <select id="genre" required style="padding: 10px; margin: 5px;">
            <option value="">Select genre</option>
            <option value="Afropop">Afropop</option>
            <option value="Afrobeats">Afrobeats</option>
        </select><br>
        <input type="number" id="budget" value="150000" required style="padding: 10px; margin: 5px;"><br>
        <button type="submit" id="spark-btn" style="padding: 10px 20px; margin: 5px;">SPARK IT</button>
    </form>

    <div id="results" style="display: none; margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px;">
        <h2>Campaign Ready!</h2>
        <div id="campaign-data"></div>
        <button onclick="executeWorkflow()" style="padding: 10px; margin: 5px;">Execute Workflow</button>
        <button onclick="downloadPDF()" style="padding: 10px; margin: 5px;">Download PDF</button>
    </div>

    <script>
        var supabase = window.supabase.createClient(
            'https://avlbrhnsjylaaokjofoo.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF2bGJyaG5zanlsYWFva2pvZm9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDIwODYsImV4cCI6MjA4ODg3ODA4Nn0.veYbgIVokeEVx_2M0AXAYF50g5IWVdymVFjtLKz5_d8'
        );
        
        var currentUser = null;
        var currentCampaign = null;
        var userProfile = null;

        async function init() {
            var result = await supabase.auth.getUser();
            var user = result.data.user;
            
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = user;
            
            var profileResult = await supabase.from('users').select('*').eq('id', user.id).single();
            if (profileResult.data) {
                userProfile = profileResult.data;
                document.getElementById('user-name').textContent = profileResult.data.artist_name;
            }
        }

        document.getElementById('campaign-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var btn = document.getElementById('spark-btn');
            btn.disabled = true;
            btn.textContent = 'GENERATING...';
            
            try {
                var response = await fetch('/api/generate-campaign', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        artistName: userProfile.artist_name,
                        trackTitle: document.getElementById('trackTitle').value,
                        genre: document.getElementById('genre').value,
                        budget: parseInt(document.getElementById('budget').value)
                    })
                });
                
                var data = await response.json();
                
                if (data.success) {
                    var saveResult = await supabase.from('campaigns').insert([{
                        user_id: currentUser.id,
                        artist_name: userProfile.artist_name,
                        track_title: document.getElementById('trackTitle').value,
                        genre: document.getElementById('genre').value,
                        budget: parseInt(document.getElementById('budget').value),
                        currency: data.campaign.currency,
                        strategy: data.campaign.strategy
                    }]).select().single();

                    currentCampaign = saveResult.data;
                    
                    var html = '<h3>' + currentCampaign.track_title + '</h3>';
                    html += '<p>Budget: ' + currentCampaign.currency + currentCampaign.budget + '</p>';
                    
                    if (currentCampaign.strategy.realistic_expectations) {
                        html += '<p>Streams: ' + currentCampaign.strategy.realistic_expectations.streams_30_days + '</p>';
                        html += '<p>Followers: ' + currentCampaign.strategy.realistic_expectations.new_followers + '</p>';
                    }
                    
                    document.getElementById('campaign-data').innerHTML = html;
                    document.getElementById('results').style.display = 'block';
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'SPARK IT';
            }
        });

        async function executeWorkflow() {
            if (!currentCampaign) return;
            
            try {
                var response = await fetch('/api/generate-workflow', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ campaign: currentCampaign })
                });
                
                var data = await response.json();
                
                if (data.success) {
                    var wfResult = await supabase.from('workflows').insert([{
                        user_id: currentUser.id,
                        campaign_id: currentCampaign.id,
                        tasks: data.workflow.tasks,
                        completed_tasks: [],
                        budget_spent: 0,
                        progress: 0
                    }]).select().single();

                    localStorage.setItem('sparkam_current_workflow', JSON.stringify(wfResult.data));
                    window.location.href = 'workflow.html';
                }
            } catch (error) {
                alert('Workflow error: ' + error.message);
            }
        }

        function downloadPDF() {
            if (!currentCampaign) return;
            
            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF();
            
            doc.text('SPARKAM CAMPAIGN', 20, 20);
            doc.text(currentCampaign.track_title, 20, 30);
            doc.save('Sparkam_Campaign.pdf');
        }

        init();
    </script>
</body>
</html>
