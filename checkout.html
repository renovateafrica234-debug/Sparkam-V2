<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f051a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spark-gradient { background: linear-gradient(90deg, #ff00cc, #3333ff); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass p-10 rounded-[2.5rem] w-full max-w-md text-center border-white/10">
        <div class="text-pink-500 mb-6 text-4xl">
            <i class="fa-solid fa-shield-check"></i>
        </div>
        <h2 class="text-2xl font-black mb-2 uppercase tracking-tight">Activate Regular</h2>
        <p class="text-gray-400 text-[10px] mb-8 uppercase tracking-[0.2em]">360° Managed AI Campaign</p>
        
        <div class="bg-white/5 p-6 rounded-2xl mb-8 border border-white/5">
            <div class="flex justify-between mb-3">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Selected Plan</span>
                <span class="text-[10px] font-bold text-pink-500 uppercase">Regular</span>
            </div>
            <div class="flex justify-between border-t border-white/10 pt-3">
                <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Total Amount</span>
                <span class="text-xl font-black text-white">₦14,000</span>
            </div>
        </div>

        <button onclick="payWithPaystack()" id="pay-btn" class="spark-gradient w-full py-4 rounded-xl font-black uppercase tracking-widest text-sm shadow-lg shadow-pink-500/20 hover:scale-[1.02] transition">
            Proceed to Payment
        </button>
        
        <div class="mt-8 flex items-center justify-center gap-2 opacity-30">
            <i class="fa-solid fa-lock text-[10px]"></i>
            <p class="text-[8px] uppercase tracking-widest font-bold">Secured by Paystack</p>
        </div>
    </div>

    <script>
        function payWithPaystack() {
            // Retrieve artist info saved during signup
            const email = localStorage.getItem('sparkam_email') || 'artist@sparkam.ai';
            const btn = document.getElementById('pay-btn');
            
            btn.innerText = "INITIALIZING...";
            btn.disabled = true;

            let handler = PaystackPop.setup({
                // PASTE YOUR KEY BELOW
                key: 'pk_live_15c2888be0b9dcf61840714ba5972865e0d259bc', 
                email: email,
                amount: 14000 * 100, // Amount in kobo
                currency: "NGN",
                callback: function(response){
                    // Success! Store reference and redirect
                    localStorage.setItem('sparkam_payment_ref', response.reference);
                    window.location.href = "/dashboard.html?status=paid&ref=" + response.reference;
                },
                onClose: function(){
                    btn.innerText = "Proceed to Payment";
                    btn.disabled = false;
                    alert('Transaction cancelled. Launch your campaign when you are ready.');
                }
            });
            handler.openIframe();
        }
    </script>
</body>
    </html>
