<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Sparkam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f051a 0%, #1a0520 100%);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass border-b border-white/10 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black gradient-text">SPARKAM ADMIN</div>
            <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">
                <i class="fa-solid fa-right-from-bracket mr-1"></i>Logout
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- Stats Overview -->
        <div class="grid md:grid-cols-4 gap-6 mb-8">
            <div class="glass rounded-xl p-6">
                <div class="text-gray-400 text-sm mb-2">Total Users</div>
                <div class="text-4xl font-black gradient-text" id="total-users">0</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-gray-400 text-sm mb-2">Beta Testers</div>
                <div class="text-4xl font-black text-green-400" id="beta-testers">0</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-gray-400 text-sm mb-2">Total Campaigns</div>
                <div class="text-4xl font-black text-pink-400" id="total-campaigns">0</div>
            </div>
            <div class="glass rounded-xl p-6">
                <div class="text-gray-400 text-sm mb-2">Active Workflows</div>
                <div class="text-4xl font-black text-purple-400" id="active-workflows">0</div>
            </div>
        </div>

        <!-- Users List -->
        <div class="glass rounded-3xl p-8">
            <h2 class="text-2xl font-black mb-6">
                <i class="fa-solid fa-users text-pink-500 mr-2"></i>
                All Users
            </h2>
            <div id="users-list">
                <div class="text-center text-gray-400 py-12">
                    <i class="fa-solid fa-spinner fa-spin text-4xl mb-4"></i>
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- User Detail Modal -->
    <div id="user-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="glass rounded-3xl p-8 max-w-4xl w-full max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black" id="modal-title">User Details</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const SUPABASE_URL = 'https://avlbrhnsjylaaokjofoo.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE'; // REPLACE WITH YOUR ANON KEY
        
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allUsers = [];
        let allCampaigns = [];
        let allWorkflows = [];

        async function init() {
            // TODO: Add admin authentication check here
            // For now, anyone can access this page
            // You should add a password protection or admin role check
            
            await loadAllData();
        }

        async function loadAllData() {
            try {
                // Load users
                const { data: users, error: usersError } = await supabase
                    .from('users')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (usersError) throw usersError;
                allUsers = users || [];

                // Load campaigns
                const { data: campaigns, error: campaignsError } = await supabase
                    .from('campaigns')
                    .select('*');

                if (campaignsError) throw campaignsError;
                allCampaigns = campaigns || [];

                // Load workflows
                const { data: workflows, error: workflowsError } = await supabase
                    .from('workflows')
                    .select('*');

                if (workflowsError) throw workflowsError;
                allWorkflows = workflows || [];

                updateStats();
                displayUsers();

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('users-list').innerHTML = `
                    <div class="text-center text-red-400 py-12">
                        <i class="fa-solid fa-exclamation-triangle text-4xl mb-4"></i>
                        <p>Error loading data: ${error.message}</p>
                    </div>
                `;
            }
        }

        function updateStats() {
            document.getElementById('total-users').textContent = allUsers.length;
            document.getElementById('beta-testers').textContent = allUsers.filter(u => u.is_beta_tester).length;
            document.getElementById('total-campaigns').textContent = allCampaigns.length;
            document.getElementById('active-workflows').textContent = allWorkflows.filter(w => w.status === 'in_progress').length;
        }

        function displayUsers() {
            if (allUsers.length === 0) {
                document.getElementById('users-list').innerHTML = `
                    <div class="text-center text-gray-400 py-12">
                        <i class="fa-solid fa-user-slash text-4xl mb-4"></i>
                        <p>No users yet</p>
                    </div>
                `;
                return;
            }

            const html = allUsers.map(user => {
                const userCampaigns = allCampaigns.filter(c => c.user_id === user.id);
                const userWorkflows = allWorkflows.filter(w => w.user_id === user.id);
                const lastLogin = user.last_login ? new Date(user.last_login).toLocaleString() : 'Never';

                return `
                    <div class="bg-black/30 rounded-xl p-6 mb-4 border border-white/5 hover:border-pink-500/30 transition">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold mb-1">${user.artist_name}</h3>
                                <p class="text-sm text-gray-400">${user.email}</p>
                                ${user.phone_number ? `<p class="text-sm text-gray-400">${user.phone_number}</p>` : ''}
                            </div>
                            <div class="text-right">
                                <span class="px-3 py-1 rounded-full text-xs font-bold ${user.is_beta_tester ? 'bg-green-500/20 text-green-400' : 'bg-purple-500/20 text-purple-400'}">
                                    ${user.tier.toUpperCase()} ${user.is_beta_tester ? '(BETA)' : ''}
                                </span>
                            </div>
                        </div>

                        <div class="grid grid-cols-4 gap-4 mb-4">
                            <div>
                                <div class="text-xs text-gray-400">Joined</div>
                                <div class="text-sm font-bold">${new Date(user.created_at).toLocaleDateString()}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400">Last Login</div>
                                <div class="text-sm font-bold">${lastLogin}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400">Campaigns</div>
                                <div class="text-sm font-bold text-pink-400">${userCampaigns.length}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400">Workflows</div>
                                <div class="text-sm font-bold text-purple-400">${userWorkflows.length}</div>
                            </div>
                        </div>

                        <div class="flex gap-3">
                            <button onclick="window.viewUser('${user.id}')" class="px-4 py-2 bg-gradient-to-r from-pink-500 to-purple-500 rounded-lg text-sm font-bold hover:opacity-90">
                                View Details
                            </button>
                            <button onclick="window.viewUserCampaigns('${user.id}')" class="px-4 py-2 bg-black/50 border border-white/10 rounded-lg text-sm font-bold hover:border-pink-500/50">
                                View Campaigns
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('users-list').innerHTML = html;
        }

        window.viewUser = function(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;

            const userCampaigns = allCampaigns.filter(c => c.user_id === userId);
            const userWorkflows = allWorkflows.filter(w => w.user_id === userId);

            document.getElementById('modal-title').textContent = `${user.artist_name} - Profile`;
            
            let html = `
                <div class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 mb-2">Email</h3>
                            <p class="text-lg">${user.email}</p>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 mb-2">Phone</h3>
                            <p class="text-lg">${user.phone_number || 'Not provided'}</p>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 mb-2">Tier</h3>
                            <p class="text-lg">${user.tier.toUpperCase()} ${user.is_beta_tester ? '(Beta Tester)' : ''}</p>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 mb-2">Status</h3>
                            <p class="text-lg">${user.subscription_status.toUpperCase()}</p>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 mb-2">Joined</h3>
                            <p class="text-lg">${new Date(user.created_at).toLocaleString()}</p>
                        </div>
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 mb-2">Last Login</h3>
                            <p class="text-lg">${user.last_login ? new Date(user.last_login).toLocaleString() : 'Never'}</p>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-lg font-bold mb-4">Recent Campaigns (${userCampaigns.length})</h3>
                        ${userCampaigns.length > 0 ? `
                            <div class="space-y-3">
                                ${userCampaigns.slice(0, 5).map(c => `
                                    <div class="bg-black/40 rounded-lg p-4 border border-white/5">
                                        <div class="flex justify-between items-start">
                                            <div>
                                                <h4 class="font-bold">"${c.track_title}"</h4>
                                                <p class="text-sm text-gray-400">${c.genre} • ${c.currency}${c.budget.toLocaleString()}</p>
                                                <p class="text-xs text-gray-500">${new Date(c.created_at).toLocaleString()}</p>
                                            </div>
                                            <span class="px-2 py-1 rounded text-xs ${c.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-gray-500/20 text-gray-400'}">
                                                ${c.status.toUpperCase()}
                                            </span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : '<p class="text-gray-400">No campaigns yet</p>'}
                    </div>

                    <div>
                        <h3 class="text-lg font-bold mb-4">Active Workflows (${userWorkflows.length})</h3>
                        ${userWorkflows.length > 0 ? `
                            <div class="space-y-3">
                                ${userWorkflows.slice(0, 5).map(w => `
                                    <div class="bg-black/40 rounded-lg p-4 border border-white/5">
                                        <div class="flex justify-between items-start">
                                            <div>
                                                <h4 class="font-bold">Workflow ${w.id.substring(0, 8)}</h4>
                                                <p class="text-sm text-gray-400">Progress: ${Math.round(w.progress * 100)}%</p>
                                                <p class="text-sm text-gray-400">Budget Spent: ${w.budget_spent}</p>
                                            </div>
                                            <span class="px-2 py-1 rounded text-xs ${w.status === 'in_progress' ? 'bg-purple-500/20 text-purple-400' : 'bg-gray-500/20 text-gray-400'}">
                                                ${w.status.toUpperCase()}
                                            </span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : '<p class="text-gray-400">No workflows yet</p>'}
                    </div>
                </div>
            `;

            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('user-modal').classList.remove('hidden');
        }

        window.viewUserCampaigns = function(userId) {
            const user = allUsers.find(u => u.id === userId);
            const userCampaigns = allCampaigns.filter(c => c.user_id === userId);

            document.getElementById('modal-title').textContent = `${user.artist_name} - Campaigns`;
            
            const html = userCampaigns.length > 0 ? 
                userCampaigns.map(c => `
                    <div class="bg-black/40 rounded-xl p-6 mb-4 border border-white/5">
                        <h3 class="text-xl font-bold mb-2">"${c.track_title}"</h3>
                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <div>
                                <div class="text-xs text-gray-400">Genre</div>
                                <div class="font-bold">${c.genre}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400">Budget</div>
                                <div class="font-bold text-pink-400">${c.currency}${c.budget.toLocaleString()}</div>
                            </div>
                            <div>
                                <div class="text-xs text-gray-400">Created</div>
                                <div class="font-bold">${new Date(c.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <details class="text-sm">
                            <summary class="cursor-pointer text-pink-400 hover:text-pink-300">View Strategy Details</summary>
                            <pre class="mt-4 bg-black/50 p-4 rounded-lg overflow-x-auto">${JSON.stringify(c.strategy, null, 2)}</pre>
                        </details>
                    </div>
                `).join('') 
                : '<p class="text-gray-400">No campaigns yet</p>';

            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('user-modal').classList.remove('hidden');
        }

        window.closeModal = function() {
            document.getElementById('user-modal').classList.add('hidden');
        }

        window.logout = function() {
            // For now, just redirect
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
